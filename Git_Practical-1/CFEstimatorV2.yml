    - data:
        code: "import json\nimport re\nimport base64\nimport os\nimport hmac\nimport\
          \ hashlib\n\ndef clean_and_parse(raw: str):\n    if not raw:\n        return\
          \ {}\n\n    # Remove markdown fences\n    cleaned = raw.strip()\n    cleaned\
          \ = re.sub(r'^```[a-zA-Z]*\\s*', '', cleaned)\n    cleaned = re.sub(r'```\\\
          s*$', '', cleaned)\n    cleaned = cleaned.strip()\n\n    try:\n        data\
          \ = json.loads(cleaned)\n\n        # Handle stringified JSON (JWT case)\n\
          \        if isinstance(data, str):\n            data = json.loads(data)\n\
          \n        return data\n\n    except Exception:\n        return {}\n\ndef\
          \ decode_jwt(token: str):\n    \"\"\"Decode and verify a JWT token using\
          \ secret from environment variable jwt_secret.\"\"\"\n    if not token:\n\
          \        return {}\n    try:\n        token = token.strip()\n        parts\
          \ = token.split('.')\n        if len(parts) != 3:\n            return {}\n\
          \        \n        header_b64, payload_b64, signature_b64 = parts\n    \
          \    \n        # Verify signature if jwt_secret is set\n        jwt_secret\
          \ = os.environ.get(\"jwt_secret\", \"\")\n        if jwt_secret:\n     \
          \       # Verify HMAC-SHA256 signature\n            signing_input = f\"\
          {header_b64}.{payload_b64}\".encode('utf-8')\n            expected_sig =\
          \ hmac.new(\n                jwt_secret.encode('utf-8'),\n             \
          \   signing_input,\n                hashlib.sha256\n            ).digest()\n\
          \            \n            # Decode the provided signature\n           \
          \ sig_padding = 4 - len(signature_b64) % 4\n            if sig_padding !=\
          \ 4:\n                signature_b64 += '=' * sig_padding\n            actual_sig\
          \ = base64.urlsafe_b64decode(signature_b64)\n            \n            if\
          \ not hmac.compare_digest(expected_sig, actual_sig):\n                return\
          \ {}\n        \n        # Decode the payload (second part)\n        padding\
          \ = 4 - len(payload_b64) % 4\n        if padding != 4:\n            payload_b64\
          \ += '=' * padding\n        decoded_bytes = base64.urlsafe_b64decode(payload_b64)\n\
          \        return json.loads(decoded_bytes)\n    except Exception:\n     \
          \   return {}\n\ndef main(result: str = \"\", text: str = \"\"):\n    #\
          \ Parse result from LLM\n    llm_data = clean_and_parse(result)\n\n    #\
          \ text contains a raw JWT token that we need to decode\n    # JWT secret\
          \ is passed via environment variable JWT_SECRET\n    jwt_dict = decode_jwt(text.strip()\
          \ if text else \"\")\n\n    # If llm_data is a list, keep it as-is\n   \
          \ llm_list = llm_data if isinstance(llm_data, list) else []\n    llm_dict\
          \ = llm_data if isinstance(llm_data, dict) else {}\n\n    # Merge dicts\
          \ (JWT takes priority for auth fields)\n    merged = {**llm_dict, **jwt_dict}\n\
          \n    # Extract fields from llm_list as arrays for iteration\n    costcode_query\
          \ = [item.get(\"costcode_query\", \"\") for item in llm_list if isinstance(item,\
          \ dict)]\n    item_name_query = [item.get(\"item_name_query\", \"\") for\
          \ item in llm_list if isinstance(item, dict)]\n    item_name = [item.get(\"\
          item_name\", \"\") for item in llm_list if isinstance(item, dict)]\n   \
          \ cost_type = [item.get(\"cost_type\", \"\") for item in llm_list if isinstance(item,\
          \ dict)]\n\n    return {\n        \"user_id\": str(jwt_dict.get(\"user_id\"\
          , \"\")),\n        \"company_id\": str(jwt_dict.get(\"company_id\", \"\"\
          )),\n        \"role_id\": str(jwt_dict.get(\"role_id\", \"\")),\n      \
          \  \"count\": len(llm_list) if llm_list else len(merged),\n        \"costcode_query\"\
          : json.dumps(costcode_query),\n        \"item_name_query\": json.dumps(item_name_query),\n\
          \        \"item_name\": json.dumps(item_name),\n        \"cost_type\": json.dumps(cost_type)\n\
          \    }\n"
