          \ str) -> dict:\n    # Extract the numerical value from the radius string\
          \ (e.g., \"10 Km\" -> 10.0)\n    if isinstance(radius, str):\n        radius_float\
          \ = float(radius.lower().replace(\"km\", \"\").strip())\n    else:\n   \
          \     radius_float = float(radius)\n        \n    # Assuming radius is in\
          \ kilometers. Earth's radius is approx 6371 km.\n    earth_radius = 6371.0\n\
          \    \n    # Calculate the change in latitude and longitude in degrees\n\
          \    lat_delta = math.degrees(radius_float / earth_radius)\n    lon_delta\
          \ = math.degrees(radius_float / (earth_radius * math.cos(math.radians(latitude))))\n\
          \    \n    return {\n        \"min_lat\": latitude - lat_delta,\n      \
          \  \"max_lat\": latitude + lat_delta,\n        \"min_lon\": longitude -\
